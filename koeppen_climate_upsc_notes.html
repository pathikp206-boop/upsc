
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans);background:transparent}
.wrap{padding:1rem 0;max-width:900px}

.cue-q.sel{color:var(--color-text-primary);font-weight:500}
.notes-title{font-size:16px;font-weight:500;color:var(--color-text-primary);margin-bottom:12px}
.chip-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.chip{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:500}
.chip-blue{background:#E6F1FB;color:#0C447C}
.chip-teal{background:#E1F5EE;color:#085041}
.chip-amber{background:#FAEEDA;color:#633806}
.chip-coral{background:#FAECE7;color:#712B13}
.chip-purple{background:#EEEDFE;color:#3C3489}
.chip-green{background:#EAF3DE;color:#27500A}
.row{display:flex;gap:8px;margin-bottom:8px;align-items:baseline}
.bullet{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:7px}
.b-blue{background:#378ADD}
.b-teal{background:#1D9E75}
.b-amber{background:#BA7517}
.b-coral{background:#D85A30}
.b-purple{background:#7F77DD}
.row-txt{font-size:13.5px;color:var(--color-text-primary);line-height:1.7}
.row-txt b{font-weight:500}
.mini-table{width:100%;border-collapse:collapse;font-size:12.5px;margin:10px 0}

.mini-table td{padding:5px 8px;color:var(--color-text-primary);border-bottom:0.5px solid var(--color-border-tertiary)}
.mini-table tr:last-child td{border-bottom:none}
.mini-table tr:hover td{background:var(--color-background-secondary)}
.summary{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:12px 14px;margin-top:14px}
.summary-label{font-size:11px;font-weight:500;color:var(--color-text-tertiary);letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px}
.summary-txt{font-size:13px;color:var(--color-text-secondary);line-height:1.6}
.mcq-block{margin-top:14px}
.mcq-q{font-size:13.5px;font-weight:500;color:var(--color-text-primary);margin-bottom:8px}
.mcq-opts{display:flex;flex-direction:column;gap:5px;margin-bottom:8px}
.mcq-opt{font-size:13px;padding:7px 12px;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);cursor:pointer;color:var(--color-text-secondary);background:var(--color-background-primary);transition:all .12s}
.mcq-opt:hover{border-color:var(--color-border-secondary);color:var(--color-text-primary)}
.mcq-opt.correct{background:#EAF3DE;border-color:#639922;color:#27500A}
.mcq-opt.wrong{background:#FCEBEB;border-color:#A32D2D;color:#501313}
.mcq-exp{font-size:13px;color:var(--color-text-secondary);line-height:1.6;margin-top:6px;padding:10px;background:var(--color-background-secondary);border-radius:var(--border-radius-md);display:none}
.next-btn{margin-top:10px;padding:7px 16px;font-size:13px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);cursor:pointer;background:var(--color-background-primary);color:var(--color-text-primary);display:none}
.next-btn:hover{background:var(--color-background-secondary)}
.hidden{display:none}
</style>

]},

{q:'Tundra: what vegetation survives?',title:'Tundra / Arctic climate (ET)',chips:[{t:'Above Arctic Circle',c:'blue'},{t:'No trees',c:'coral'},{t:'Permafrost',c:'purple'}],points:[
{c:'teal',t:'<b>No trees</b>; lowest forms of vegetation — mosses, lichens, hardy grasses, reindeer moss'},
{c:'blue',t:'Mid-winter: <b>–40 to –50°C</b>; not more than 4 months above freezing; blizzards at 130 mph'},
{c:'amber',t:'Brief summer: berry bushes, Arctic flowers bloom; birds migrate north; insects emerge'},
{c:'coral',t:'<b>Eskimos</b> (Inuit): igloos in winter; fish, seals, walruses, polar bears as food; now use rifles'},
{c:'purple',t:'<b>Penguins</b> = Antarctic only; not found in Arctic (polar bears are Arctic, not Antarctic)'}
],table:{h:['Resource','Location'],rows:[['Gold','Alaska'],['Petroleum','Kenai Peninsula, Alaska'],['Copper','Rankin Inlet, Canada'],['Iron ore','Labrador (Canada); Kiruna & Gallivare (Sweden)'],['Timber + fur','Siberian Arctic seaboard (via icebreakers)']]},summary:'ET = tundra; EF = ice cap (Greenland, Antarctica). No trees; mosses/lichens; semi-nomadic Eskimos; recent mineral discoveries driving development. Antarctica = 10,000 ft thick ice cap.',mcqs:[
{q:'Penguins are found in:',opts:['Arctic (North Pole)','Both Arctic and Antarctic','Antarctic only','Neither; they live in temperate zones'],ans:2,exp:'Penguins live only in the southern hemisphere, primarily in Antarctica and surrounding islands. The Arctic equivalent (in terms of ecological role) is the auk family. This is a classic UPSC distractor.'},
{q:'Iron ore deposits at Kiruna and Gallivare are important for which country\'s exports?',opts:['Canada','Russia','Norway','Sweden'],ans:3,exp:'Kiruna and Gallivare in northern Sweden contain rich iron ore deposits that have made Sweden a significant exporter of iron and steel and metallurgical products — despite the tundra climate.'}
]}
]}
];

let activeTab='overview';
let activeQ=0;
let qAnswered={};

function renderTabs(){
const bar=document.getElementById('tabBar');
bar.innerHTML='';
data.forEach(d=>{
const t=document.createElement('button');
t.className='tab'+(d.id===activeTab?' active':'');
t.textContent=d.label;
t.onclick=()=>{activeTab=d.id;activeQ=0;render()};
bar.appendChild(t);
});
}

function renderMain(){
const group=data.find(d=>d.id===activeTab);
const cue=group.cues[activeQ];
const m=document.getElementById('main');
m.innerHTML='';

const cornell=document.createElement('div');
cornell.className='cornell';

const cuePane=document.createElement('div');
cuePane.className='cue';
cuePane.innerHTML='<div class="cue-label">Cue questions</div>';
group.cues.forEach((c,i)=>{
const q=document.createElement('div');
q.className='cue-q'+(i===activeQ?' sel':'');
q.textContent=c.q;
q.onclick=()=>{activeQ=i;render()};
cuePane.appendChild(q);
});

const notesPane=document.createElement('div');
notesPane.className='notes';

let html=`<div class="notes-title">${cue.title}</div>`;
html+=`<div class="chip-row">`;
cue.chips.forEach(ch=>{html+=`<span class="chip chip-${ch.c}">${ch.t}</span>`});
html+=`</div>`;
cue.points.forEach(p=>{
html+=`<div class="row"><div class="bullet b-${p.c}"></div><div class="row-txt">${p.t}</div></div>`;
});
if(cue.table){
html+=`<table class="mini-table"><thead><tr>`;
cue.table.h.forEach(h=>{html+=`<th>${h}</th>`});
html+=`</tr></thead><tbody>`;
cue.table.rows.forEach(r=>{
html+=`<tr>`;
r.forEach(cell=>{html+=`<td>${cell}</td>`});
html+=`</tr>`;
});
html+=`</tbody></table>`;
}
html+=`<div class="summary"><div class="summary-label">Summary</div><div class="summary-txt">${cue.summary}</div></div>`;

if(cue.mcqs && cue.mcqs.length){
html+=`<div class="mcq-block" id="mcqBlock">`;
const key=activeTab+'_'+activeQ;
const state=qAnswered[key]||{qi:0,done:false};
const qi=state.qi||0;
const mcq=cue.mcqs[qi];
html+=`<div class="mcq-q" style="margin-top:14px;font-size:12px;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:.05em">Practice question ${qi+1}/${cue.mcqs.length}</div>`;
html+=`<div class="mcq-q">${mcq.q}</div><div class="mcq-opts" id="opts">`;
mcq.opts.forEach((o,oi)=>{
html+=`<div class="mcq-opt" data-i="${oi}">${String.fromCharCode(65+oi)}. ${o}</div>`;
});
html+=`</div><div class="mcq-exp" id="mcqExp">${mcq.exp}</div>`;
html+=`<button class="next-btn" id="nextBtn">${qi+1<cue.mcqs.length?'Next question →':'See notes again'}</button>`;
html+=`</div>`;
}

notesPane.innerHTML=html;

if(cue.mcqs){
const key=activeTab+'_'+activeQ;
const state=qAnswered[key]||{qi:0,answered:false};
notesPane.querySelectorAll('.mcq-opt').forEach(opt=>{
opt.onclick=function(){
if(state.answered) return;
state.answered=true;
const chosen=parseInt(this.dataset.i);
const qi=state.qi||0;
const mcq=cue.mcqs[qi];
notesPane.querySelectorAll('.mcq-opt').forEach((o,i)=>{
if(i===mcq.ans) o.className='mcq-opt correct';
else if(i===chosen) o.className='mcq-opt wrong';
});
const exp=notesPane.querySelector('#mcqExp');
if(exp) exp.style.display='block';
const nb=notesPane.querySelector('#nextBtn');
if(nb) nb.style.display='inline-block';
qAnswered[key]=state;
}
});
const nb=notesPane.querySelector('#nextBtn');
if(nb) nb.onclick=function(){
const qi=(state.qi||0);
if(qi+1<cue.mcqs.length){
qAnswered[key]={qi:qi+1,answered:false};
} else {
delete qAnswered[key];
}
render();
};
}

cornell.appendChild(cuePane);
cornell.appendChild(notesPane);
m.appendChild(cornell);
}

function render(){renderTabs();renderMain()}
render();
</script>
