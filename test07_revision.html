
<style>

.progress{font-size:11px;color:var(--color-text-tertiary);margin-bottom:12px}

{n:'Q6',ans:'(A)',title:'National symbols — chronological order',chips:[{t:'P→R→Q→S',c:'green'},{t:'1947→1950→1950→1973',c:'blue'}],

{n:'Q75',ans:'(b)',title:'Sangam literature — key features',chips:[{t:'Only 2 correct',c:'amber'},{t:'Tinai system',c:'teal'},{t:'Akam/Puram',c:'blue'}],

{n:'Q78',ans:'(b)',title:'Megalithic burials in South India',chips:[{t:'Only 2 correct',c:'amber'},{t:'Iron Age',c:'coral'},{t:'Not only W Ghats',c:'red'}],

{c:'red',t:'Stmt 3 FALSE — NOT exclusively Western Ghats; found across Kerala, Tamil Nadu, Karnataka, AP, Maharashtra, Odisha'},
{c:'amber',t:'Key sites: Adichanallur (TN), Hallur (Karnataka, ~1000 BCE), Brahmagiri (Karnataka — excavated by Mortimer Wheeler)'}
],trap:'Statement 3 is the trap — megaliths are widespread across the Deccan and peninsular India, not confined to Western Ghats.',

],trap:'Vellalar = land-owning settled cultivators, NOT warriors or traders.',

{n:'Q16',ans:'(C)',title:'Monsoon formation — causal sequence',chips:[{t:'S→Q→P→R',c:'blue'},{t:'ITCZ shift',c:'teal'},{t:'Differential heating',c:'amber'}],
points:[
{c:'amber',t:'S first: <b>Differential heating</b> of Indian landmass vs Indian Ocean (Mar–May); Tibetan Plateau acts as heat engine'},
{c:'teal',t:'Q second: <b>ITCZ shifts northward</b> to 20°–25°N over Indo-Gangetic Plain — becomes the Monsoon Trough; westerly jet withdraws'},
{c:'blue',t:'P third: Intense <b>low pressure</b> develops over Thar Desert and NW India'},

],trap:'The sequence is causal, not simultaneous. Differential heating CAUSES ITCZ shift which CAUSES low pressure which CAUSES moisture inflow.',

sum:'S (differential heating) → Q (ITCZ northward shift) → P (Thar low pressure) → R (SW monsoon moisture inflow).',
mcqs:[{q:'The ITCZ during peak summer monsoon is located over:',opts:['The Arabian Sea','The Bay of Bengal','The Indo-Gangetic Plain','The Tibetan Plateau'],ans:2,exp:'The ITCZ shifts northward during summer, settling over the Indo-Gangetic Plain (around 20°–25°N) where it is called the Monsoon Trough. Its position here draws in the SW monsoon winds.'}]},

{n:'Q100',ans:'(c)',title:'IVC site with three-tier city division',chips:[{t:'Dholavira',c:'teal'},{t:'Gujarat / Kutch',c:'amber'},{t:'UNESCO 2021',c:'blue'}],

{id:'polity',label:'Polity',color:'purple',qs:[
{n:'Q14',ans:'(b)',title:'President\'s pardoning power — Article 72',chips:[{t:'Only 2 correct',c:'amber'},{t:'Judicial review allowed',c:'red'},{t:'Art. 72',c:'purple'}],

{c:'red',t:'Stmt 3 FALSE (the trap) — Power IS subject to <b>limited judicial review</b> on grounds of mala fide, arbitrariness, or violation of Constitution (Epuru Sudhakar, 2006; Maru Ram, 1980)'}

{n:'Q43',ans:'(C)',title:'Fundamental Rights during national emergency',chips:[{t:'Art. 20 & 21 protected',c:'green'},{t:'44th Amendment 1978',c:'blue'},{t:'Art. 358 vs 359',c:'amber'}],

{c:'green',t:'<b>Article 359</b>: President CAN suspend right to approach courts for enforcement of FRs — EXCEPT Articles 20 and 21'},
{c:'teal',t:'<b>44th Amendment (1978)</b>: Made Articles 20 and 21 non-suspendable even by Presidential order — response to 1975–77 Emergency abuse'},
{c:'amber',t:'Before 44th Amendment, even Art. 20 & 21 enforcement could be suspended — this was the major democratic failure of Emergency era'}

let activeTab='history';
let activeCueIdx=0;
let mcqState={};

function renderTabs(){
const bar=document.getElementById('tabBar');
bar.innerHTML='';
subjects.forEach(s=>{
const t=document.createElement('button');
t.className='tab'+(s.id===activeTab?' active':'');
t.textContent=s.label+' ('+s.qs.length+')';
t.onclick=()=>{activeTab=s.id;activeCueIdx=0;render()};
bar.appendChild(t);
});
}

function renderMain(){
const subj=subjects.find(s=>s.id===activeTab);
const q=subj.qs[activeCueIdx];
const m=document.getElementById('main');
m.innerHTML='';

const cornell=document.createElement('div');
cornell.className='cornell';

const cuePane=document.createElement('div');
cuePane.className='cue-pane';
const cl=document.createElement('div');
cl.className='cue-label';
cl.textContent='Questions ('+subj.qs.length+')';
cuePane.appendChild(cl);
subj.qs.forEach((qi,i)=>{
const c=document.createElement('div');
c.className='cue-item'+(i===activeCueIdx?' sel':'');
c.innerHTML='<span style="font-weight:500;font-size:11px">'+qi.n+'</span> — '+qi.title.substring(0,30)+(qi.title.length>30?'...':'');
c.onclick=()=>{activeCueIdx=i;render()};
cuePane.appendChild(c);
});
cornell.appendChild(cuePane);

const notesPane=document.createElement('div');
notesPane.className='notes-pane';

const hdr=document.createElement('div');
hdr.className='q-header';
hdr.innerHTML='<span class="q-num">'+q.n+'</span><span class="q-ans">Ans: '+q.ans+'</span>';
notesPane.appendChild(hdr);

const title=document.createElement('div');
title.className='q-title';
title.textContent=q.title;
notesPane.appendChild(title);

const chips=document.createElement('div');
chips.className='chips';
q.chips.forEach(ch=>{
chips.innerHTML+='<span class="chip cp-'+ch.c+'">'+ch.t+'</span>';
});
notesPane.appendChild(chips);

q.points.forEach(p=>{
const row=document.createElement('div');
row.className='point';
row.innerHTML='<div class="dot dot-'+p.c+'"></div><div class="pt">'+p.t+'</div>';
notesPane.appendChild(row);
});

if(q.trap){
const tr=document.createElement('div');
tr.className='trap';
tr.innerHTML='<div class="trap-label">UPSC trap alert</div>'+q.trap;
notesPane.appendChild(tr);
}

if(q.table){
const wrap=document.createElement('div');
wrap.style.overflowX='auto';
let html='<table class="mtable"><thead><tr>';
q.table.h.forEach(h=>{html+='<th>'+h+'</th>'});
html+='</tr></thead><tbody>';
q.table.rows.forEach(r=>{html+='<tr>'+r.map(c=>'<td>'+c+'</td>').join('')+'</tr>'});
html+='</tbody></table>';
wrap.innerHTML=html;
notesPane.appendChild(wrap);
}

const sumbox=document.createElement('div');
sumbox.className='sumbox';
sumbox.innerHTML='<div class="sum-label">Summary</div><div class="sum-txt">'+q.sum+'</div>';
notesPane.appendChild(sumbox);

if(q.mcqs&&q.mcqs.length){
const key=activeTab+'_'+activeCueIdx;
const state=mcqState[key]||{qi:0,answered:false};
const mcqWrap=document.createElement('div');
mcqWrap.className='mcq-wrap';
const qIdx=state.qi||0;
const mcq=q.mcqs[qIdx];
mcqWrap.innerHTML='<div class="mcq-meta">Practice MCQ '+(qIdx+1)+'/'+q.mcqs.length+'</div><div class="mcq-q">'+mcq.q+'</div>';
const optsDiv=document.createElement('div');
mcq.opts.forEach((o,oi)=>{
const opt=document.createElement('div');
opt.className='opt';
opt.textContent=String.fromCharCode(65+oi)+'. '+o;
opt.dataset.i=oi;
optsDiv.appendChild(opt);
});
mcqWrap.appendChild(optsDiv);
const exp=document.createElement('div');
exp.className='exp';
exp.textContent=mcq.exp;
mcqWrap.appendChild(exp);
const nxt=document.createElement('button');
nxt.className='nxt';
nxt.textContent=qIdx+1<q.mcqs.length?'Next MCQ →':'Reset MCQs';
mcqWrap.appendChild(nxt);
notesPane.appendChild(mcqWrap);

optsDiv.querySelectorAll('.opt').forEach(opt=>{
opt.onclick=function(){
if(state.answered) return;
state.answered=true;
const chosen=parseInt(this.dataset.i);
optsDiv.querySelectorAll('.opt').forEach((o,i)=>{
if(i===mcq.ans) o.className='opt correct';
else if(i===chosen) o.className='opt wrong';
});
exp.style.display='block';
nxt.style.display='inline-block';
mcqState[key]=state;
}
});
nxt.onclick=function(){
const qi=state.qi||0;
if(qi+1<q.mcqs.length){
mcqState[key]={qi:qi+1,answered:false};
} else {
delete mcqState[key];
}
render();
};
}

cornell.appendChild(notesPane);
m.appendChild(cornell);
}

function render(){renderTabs();renderMain()}
render();
</script>
