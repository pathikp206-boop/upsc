  {y:"1942–45",e:"Parallel Governments (QIM)",p:"Chittu Pandey, JP Narayan",f:"Ballia UP, Tamluk WB (Jatiya Sarkar), Satara MH (Prati Sarkar — longest lasting); heroic underground resistance",s:3,t:"political",era:"freedom"},
  {y:"1943",e:"Bengal Famine",p:"—",f:"2–3 million dead; Churchill's wartime export policies widely blamed; Amartya Sen later argued famines are fundamentally political",s:3,t:"economy",era:"freedom"},
  {y:"1945",e:"INA Trials at Red Fort",p:"Shah Nawaz Khan, P.K. Sehgal, G.S. Dhillon",f:"Defended brilliantly by Bhulabhai Desai + Nehru; trials spectacularly backfired — made INA officers national heroes",s:3,t:"political",era:"freedom"},
  {y:"18 Feb 1946",e:"Royal Indian Navy Mutiny",p:"Naval ratings",f:"78 ships + 20 shore establishments mutinied; showed British could no longer trust Indian armed forces — decisive signal",s:3,t:"war",era:"freedom"},
  {y:"1946",e:"Cabinet Mission Plan",p:"Cripps, Pethick-Lawrence, A.V. Alexander",f:"Proposed united India with 3-tier federal structure; Congress partly accepted; ML rejected → plan collapsed",s:3,t:"political",era:"freedom"},
  {y:"16 Aug 1946",e:"Direct Action Day",p:"Muslim League",f:"'Great Calcutta Killings'; ~4,000–5,000 dead; triggered chain of communal riots across Bengal and Bihar",s:3,t:"war",era:"freedom"},
  {y:"9 Dec 1946",e:"Constituent Assembly 1st Session",p:"Dr. Sachchidananda Sinha (temp. president)",f:"Oldest member presided as temporary chair; Dr. Rajendra Prasad later elected permanent president; Muslim League boycotted",s:3,t:"political",era:"freedom"},
  {y:"3 Jun 1947",e:"Mountbatten Plan",p:"Lord Mountbatten",f:"Partition formally announced; India + Pakistan as two separate dominions; transfer of power on 15 Aug 1947",s:3,t:"political",era:"freedom"},
  {y:"14–15 Aug 1947",e:"Independence",p:"Nehru, Jinnah",f:"Pakistan (14 Aug); India (15 Aug); Radcliffe Line drawn in 5 weeks; 10–15 million displaced in largest migration in history",s:3,t:"political",era:"freedom"},
];
const ERAS=[
  {id:"early",label:"Early EIC",range:"1600–1757",color:"#c9a84c"},
  {id:"expansion",label:"EIC Expansion",range:"1757–1857",color:"#5dba85"},
  {id:"crown",label:"Crown Rule",range:"1857–1905",color:"#5a9fd4"},
  {id:"nationalism",label:"Early Nationalism",range:"1905–1915",color:"#c07ac0"},
  {id:"gandhi",label:"Gandhi Era",range:"1915–1939",color:"#d4935a"},
  {id:"freedom",label:"Freedom Struggle",range:"1939–1947",color:"#e07060"},
];
let currentEra='all', minStars=0, query='';
function stars(n){return '★'.repeat(n)+'☆'.repeat(3-n)}
function filterAll(){
  query=document.getElementById('srch').value.toLowerCase();
  renderAll();
}
function setEra(e,btn){
  currentEra=e;
  document.querySelectorAll('.era-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderAll();
}
function toggleStar(n){
  if(minStars===n){minStars=0;document.getElementById('sf2').classList.remove('active');document.getElementById('sf3').classList.remove('active');}
  else{minStars=n;document.getElementById('sf2').classList.toggle('active',n<=2);document.getElementById('sf3').classList.toggle('active',n===3);if(n===3)document.getElementById('sf2').classList.remove('active');}
  renderAll();
}
function renderAll(){
  const tl=document.getElementById('timeline');
  tl.innerHTML='';
  const erasToShow=currentEra==='all'?ERAS:ERAS.filter(e=>e.id===currentEra);
  erasToShow.forEach(era=>{
    const events=EVENTS.filter(ev=>{
      if(ev.era!==era.id)return false;
      if(ev.s<minStars)return false;
      if(query&&!`${ev.y} ${ev.e} ${ev.p} ${ev.f}`.toLowerCase().includes(query))return false;
      return true;
    });
    const sec=document.createElement('div');
    sec.className='era-section';
    const hdr=document.createElement('div');
    hdr.className='era-header';
    hdr.innerHTML=`<span class="era-label" style="color:${era.color}">${era.label}</span><span class="era-range">${era.range}</span><span class="era-count">${events.length} events</span>`;
    sec.appendChild(hdr);
    const grid=document.createElement('div');
    grid.className='grid';
    if(events.length===0){
      grid.innerHTML='<div class="empty-state">No events match this filter</div>';
    } else {
      events.forEach(ev=>{
        const card=document.createElement('div');
        card.className=`card t-${ev.t}`;
        const tagLabel={war:'War',reform:'Act/Reform',social:'Social',political:'Political',economy:'Economy'}[ev.t];
        card.innerHTML=`
          <div class="card-top">
            <span class="year">${ev.y}</span>
            <span class="stars">${stars(ev.s)}</span>
          </div>
          <div class="event">${ev.e}</div>
          ${ev.p&&ev.p!=='—'?`<div class="people">${ev.p}</div>`:''}
          <div class="facts">${ev.f}</div>
          <div style="margin-top:6px"><span class="tag tag-${ev.t}">${tagLabel}</span></div>`;
        grid.appendChild(card);
      });
    }
    sec.appendChild(grid);
    tl.appendChild(sec);
  });
}
renderAll();
</script>
